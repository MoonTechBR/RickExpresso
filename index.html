<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Rick Transportes - Orçamento Online Rápido</title>
    <meta name="description" content="Faça seu orçamento online para mudanças e carretos com a Rick Transportes. Logística rápida, segura e com preço justo em São Paulo e região.">
    <meta name="keywords" content="mudança, carreto, transportadora, frete, logística, são paulo, rick transportes, orçamento de mudança">
    <meta name="author" content="Rick Transportes">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://orcamento.logisticaveicular.com.br/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://orcamento.logisticaveicular.com.br/">
    <meta property="og:title" content="Rick Transportes - Orçamento Online">
    <meta property="og:description" content="Precisa de frete ou mudança? Selecione seus itens e receba seu orçamento na hora pelo WhatsApp.">
    <meta property="og:image" content="https://orcamento.logisticaveicular.com.br/logo.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Rick Transportes">
    <meta property="og:locale" content="pt_BR">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://orcamento.logisticaveicular.com.br/">
    <meta name="twitter:title" content="Rick Transportes - Orçamento Online">
    <meta name="twitter:description" content="Precisa de frete ou mudança? Selecione seus itens e receba seu orçamento na hora.">
    <meta name="twitter:image" content="https://orcamento.logisticaveicular.com.br/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        heading: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            light: '#1e293b',
                            cyan: '#06b6d4',
                            red: '#ef4444',
                            green: '#22c55e'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .accordion-content { transition: max-height 0.3s ease-in-out, padding 0.3s ease; max-height: 0; overflow: hidden; }
        .accordion-content.open { max-height: 1500px; padding-top: 1rem; padding-bottom: 1rem; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-24 font-sans">

    <header class="relative bg-brand-dark text-white overflow-hidden pb-12 rounded-b-[2.5rem] shadow-xl">
        <div class="absolute inset-0 bg-gradient-to-t from-brand-dark to-brand-light opacity-90"></div>
        
        <div class="relative z-10 flex flex-col items-center pt-8 px-4 text-center">
            <div class="w-36 h-36 rounded-full border-4 border-brand-cyan bg-white flex items-center justify-center shadow-[0_0_25px_rgba(6,182,212,0.4)] mb-4 overflow-hidden p-1">
                <img src="https://i.ibb.co/pBXVVWn2/og-image.png" alt="Rick Transportes Logo" class="w-full h-full object-contain rounded-full">
            </div>
            
            <h1 class="font-heading font-900 text-4xl italic tracking-tight mb-1">RICK</h1>
            <h2 class="font-heading font-800 text-3xl text-brand-cyan italic tracking-tight mb-2">TRANSPORTES</h2>
            <p class="text-xs tracking-widest uppercase mb-6 font-bold text-gray-300">Soluções em Logística Rápida</p>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-8 relative z-20">
        
        <div class="bg-white rounded-2xl shadow-lg p-5 mb-6 border border-gray-100">
            <h3 class="font-heading font-800 text-xl italic text-center mb-4 uppercase text-gray-800">Detalhes do Orçamento</h3>
            
            <div class="bg-brand-dark text-brand-cyan font-bold text-center py-2.5 rounded-lg mb-6 text-sm uppercase tracking-wide">
                Mudança Residencial
            </div>

            <div class="mb-6">
                <h4 class="font-bold text-brand-cyan border-l-4 border-brand-cyan pl-2 mb-3 text-sm">1. LOGÍSTICA E TRAJETO</h4>
                <div class="space-y-3">
                    <div class="relative">
                        <i class="fa-solid fa-location-dot absolute left-3.5 top-3.5 text-brand-red"></i>
                        <input type="text" id="origem" placeholder="Retirada (Bairro/Cidade)" class="w-full bg-gray-50 border border-gray-200 rounded-lg py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-brand-cyan focus:ring-1 focus:ring-brand-cyan transition-all">
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-flag-checkered absolute left-3.5 top-3.5 text-gray-500"></i>
                        <input type="text" id="destino" placeholder="Entrega (Bairro/Cidade)" class="w-full bg-gray-50 border border-gray-200 rounded-lg py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-brand-cyan focus:ring-1 focus:ring-brand-cyan transition-all">
                    </div>
                    <select id="escadas" class="w-full bg-gray-50 border border-gray-200 rounded-lg py-3 px-4 text-sm text-gray-700 focus:outline-none focus:border-brand-cyan transition-all">
                        <option value="Não informado">O local possui escadas?</option>
                        <option value="Térreo ou Elevador">Não, térreo ou elevador</option>
                        <option value="1 a 2 lances">Sim, 1 a 2 lances</option>
                        <option value="3 ou mais lances">Sim, 3 ou mais lances</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <h4 class="font-bold text-brand-cyan border-l-4 border-brand-cyan pl-2 mb-3 text-sm">2. SERVIÇOS EXTRAS</h4>
                <div class="flex gap-3">
                    <select id="ajudantes" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg py-3 px-3 text-sm text-gray-700 focus:outline-none focus:border-brand-cyan">
                        <option value="0">Sem Ajudante</option>
                        <option value="1">1 Ajudante</option>
                        <option value="2">2 Ajudantes</option>
                        <option value="3+">3+ Ajudantes</option>
                    </select>
                    <select id="montador" class="flex-1 bg-white border-2 border-brand-cyan rounded-lg py-3 px-3 text-sm text-gray-700 focus:outline-none font-medium">
                        <option value="Não">Sem Montador</option>
                        <option value="Sim">Com Montador</option>
                    </select>
                </div>
            </div>

            <div>
                <h4 class="font-bold text-brand-cyan border-l-4 border-brand-cyan pl-2 mb-3 text-sm">3. INVENTÁRIO (VOLUME)</h4>
                
                <div class="mb-2 border border-gray-200 rounded-lg overflow-hidden">
                    <button class="w-full bg-gray-50 hover:bg-gray-100 px-4 py-3.5 flex justify-between items-center font-bold text-gray-700 transition-colors" onclick="toggleAccordion('acc-cozinha', this)">
                        <span class="text-sm"><i class="fa-solid fa-kitchen-set mr-2 text-brand-cyan text-lg align-middle"></i> Cozinha / Lavanderia</span>
                        <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300"></i>
                    </button>
                    <div id="acc-cozinha" class="accordion-content bg-white px-4 border-t border-gray-100">
                        <div class="space-y-4" id="list-cozinha"></div>
                    </div>
                </div>

                <div class="mb-2 border border-gray-200 rounded-lg overflow-hidden">
                    <button class="w-full bg-gray-50 hover:bg-gray-100 px-4 py-3.5 flex justify-between items-center font-bold text-gray-700 transition-colors" onclick="toggleAccordion('acc-sala', this)">
                        <span class="text-sm"><i class="fa-solid fa-couch mr-2 text-brand-cyan text-lg align-middle"></i> Sala de Estar / Jantar</span>
                        <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300"></i>
                    </button>
                    <div id="acc-sala" class="accordion-content bg-white px-4 border-t border-gray-100">
                        <div class="space-y-4" id="list-sala"></div>
                    </div>
                </div>

                <div class="mb-2 border border-gray-200 rounded-lg overflow-hidden">
                    <button class="w-full bg-gray-50 hover:bg-gray-100 px-4 py-3.5 flex justify-between items-center font-bold text-gray-700 transition-colors" onclick="toggleAccordion('acc-quarto', this)">
                        <span class="text-sm"><i class="fa-solid fa-bed mr-2 text-brand-cyan text-lg align-middle"></i> Quartos</span>
                        <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300"></i>
                    </button>
                    <div id="acc-quarto" class="accordion-content bg-white px-4 border-t border-gray-100">
                        <div class="space-y-4" id="list-quarto"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-brand-dark text-white p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.15)] z-50 flex justify-center items-center cursor-pointer hover:bg-gray-800 transition-colors" onclick="submitToWhatsApp()">
        <div class="font-heading font-800 text-base tracking-wide flex items-center gap-3">
            <span>( <span id="total-items" class="text-brand-cyan font-900 text-lg">0</span> ) VER MINHA LISTA</span>
            <i class="fa-solid fa-truck-fast text-xl text-brand-cyan"></i>
        </div>
    </div>

    <script>
        const inventoryData = {
            cozinha: [
                { id: 'geladeira', name: 'Geladeira', icon: 'fa-box' },
                { id: 'fogao', name: 'Fogão / Máq. Lavar', icon: 'fa-box' },
                { id: 'armario_coz', name: 'Armário (Módulos)', icon: 'fa-box' },
                { id: 'mesa_peq', name: 'Mesa Pequena', icon: 'fa-box' }
            ],
            sala: [
                { id: 'sofa', name: 'Sofá', icon: 'fa-couch' },
                { id: 'rack', name: 'Rack / Painel', icon: 'fa-tv' },
                { id: 'mesa_jantar', name: 'Mesa de Jantar', icon: 'fa-utensils' },
                { id: 'cadeiras', name: 'Cadeiras (Unid.)', icon: 'fa-chair' }
            ],
            quarto: [
                { id: 'cama_solt', name: 'Cama Solteiro', icon: 'fa-bed' },
                { id: 'cama_casal', name: 'Cama Casal/Queen', icon: 'fa-bed' },
                { id: 'guarda_roupa', name: 'Guarda-Roupa', icon: 'fa-door-closed' },
                { id: 'comoda', name: 'Cômoda / Mesa', icon: 'fa-box' }
            ]
        };

        let itemsCount = {};
        let totalItemsCount = 0;

        // Inicializa o contador de itens zerado
        Object.keys(inventoryData).forEach(category => {
            inventoryData[category].forEach(item => {
                itemsCount[item.name] = 0;
            });
        });

        function renderItems(category, containerId) {
            const container = document.getElementById(containerId);
            let html = '';
            
            inventoryData[category].forEach(item => {
                html += `
                <div class="flex justify-between items-center border-b border-gray-100 pb-3 last:border-0 last:pb-0 pt-1">
                    <div class="flex items-center gap-3 text-sm font-semibold text-gray-700">
                        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400">
                            <i class="fa-solid ${item.icon}"></i>
                        </div>
                        ${item.name}
                    </div>
                    <div class="flex items-center gap-3 bg-gray-50 rounded-full px-1.5 py-1 border border-gray-200">
                        <button class="w-7 h-7 rounded-full bg-white border border-gray-200 text-gray-600 flex items-center justify-center font-bold hover:bg-gray-100 transition shadow-sm" onclick="updateCount('${item.id}', '${item.name}', -1)">-</button>
                        <span id="count-${item.id}" class="w-5 text-center font-bold text-gray-800 text-sm">0</span>
                        <button class="w-7 h-7 rounded-full bg-brand-dark text-white flex items-center justify-center font-bold hover:bg-brand-cyan transition shadow-sm" onclick="updateCount('${item.id}', '${item.name}', 1)">+</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        renderItems('cozinha', 'list-cozinha');
        renderItems('sala', 'list-sala');
        renderItems('quarto', 'list-quarto');

        function updateCount(itemId, itemName, change) {
            const countElement = document.getElementById(`count-${itemId}`);
            let currentCount = parseInt(countElement.innerText);
            let newCount = currentCount + change;

            if (newCount >= 0) {
                countElement.innerText = newCount;
                itemsCount[itemName] = newCount;
                totalItemsCount += change;
                
                const totalEl = document.getElementById('total-items');
                totalEl.innerText = totalItemsCount;
                totalEl.classList.add('scale-125');
                setTimeout(() => totalEl.classList.remove('scale-125'), 200);
            }
        }

        function toggleAccordion(id, btnElement) {
            const content = document.getElementById(id);
            const icon = btnElement.querySelector('.fa-chevron-down');
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // Nova Lógica de Conversão (Substitui o Alert)
        function submitToWhatsApp() {
            if (totalItemsCount === 0) {
                // Aqui mantemos um alerta simples apenas como barreira de erro, nunca para sucesso.
                alert('Por favor, adicione pelo menos um item da sua mudança antes de prosseguir.');
                return;
            }

            const origem = document.getElementById('origem').value || 'Não informado';
            const destino = document.getElementById('destino').value || 'Não informado';
            const escadas = document.getElementById('escadas').value;
            const ajudantes = document.getElementById('ajudantes').value;
            const montador = document.getElementById('montador').value;

            let mensagem = `*NOVO ORÇAMENTO - RICK TRANSPORTES*%0A%0A`;
            mensagem += `📍 *Retirada:* ${origem}%0A`;
            mensagem += `🏁 *Entrega:* ${destino}%0A`;
            mensagem += `🪜 *Escadas:* ${escadas}%0A`;
            mensagem += `💪 *Ajudantes:* ${ajudantes}%0A`;
            mensagem += `🔧 *Montagem:* ${montador}%0A%0A`;
            
            mensagem += `📦 *INVENTÁRIO (${totalItemsCount} volumes):*%0A`;
            
            for (const [item, qtd] of Object.entries(itemsCount)) {
                if (qtd > 0) {
                    mensagem += `- ${qtd}x ${item}%0A`;
                }
            }

            mensagem += `%0AAguardo o retorno com os valores. Obrigado!`;

            // Número do WhatsApp extraído da sua logo (11 96369-2499)
            const numeroWhatsApp = "5511963692499";
            const url = `https://wa.me/${numeroWhatsApp}?text=${mensagem}`;
            
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
