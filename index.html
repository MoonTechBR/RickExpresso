<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick Transportes - Expresso e Mudanças</title>
    
    <meta property="og:title" content="Rick Transportes - Orçamento Online">
    <meta property="og:description" content="Soluções em Logística, Mudanças e Carretos. Faça seu orçamento online rapidamente.">
    <meta property="og:image" content="https://i.ibb.co/pBXVVWn2/og-image.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        heading: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            light: '#1e293b',
                            cyan: '#06b6d4',
                            red: '#ef4444',
                            green: '#22c55e'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Styles for hidden scrollbars and smooth transitions */
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .accordion-content { transition: max-height 0.3s ease-in-out, padding 0.3s ease; max-height: 0; overflow: hidden; }
        .accordion-content.open { max-height: 1000px; padding-top: 1rem; padding-bottom: 1rem; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 pb-24 font-sans">

    <header class="relative bg-brand-dark text-white overflow-hidden pb-12 rounded-b-[2.5rem] shadow-xl">
        <div class="absolute inset-0 bg-[url('https://i.ibb.co/chc1Cb4Q/og-imagem.jpg')] bg-cover bg-center opacity-20"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-brand-dark to-transparent"></div>
        
        <div class="relative z-10 flex flex-col items-center pt-10 px-4 text-center">
            <div class="w-32 h-32 rounded-full border-4 border-brand-cyan bg-white flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.5)] mb-4 overflow-hidden">
                <img src="https://i.ibb.co/pBXVVWn2/og-image.png" alt="Rick Transportes Logo" class="w-full h-full object-cover">
            </div>
            
            <h1 class="font-heading font-800 text-4xl italic tracking-tight mb-1">RICK</h1>
            <h2 class="font-heading font-700 text-3xl text-brand-cyan italic tracking-tight mb-2">TRANSPORTES</h2>
            <p class="text-sm tracking-widest uppercase mb-6 font-medium">Expresso e Mudanças</p>
            
            <div id="status-badge" class="bg-brand-green/20 border border-brand-green text-brand-green px-4 py-2 rounded-full flex items-center gap-2 text-sm font-bold tracking-wide shadow-lg cursor-pointer transition-colors" onclick="toggleStatus()">
                <div class="w-3 h-3 bg-brand-green rounded-full animate-pulse status-indicator"></div>
                <span class="status-text">DISPONÍVEL AGORA</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-6 relative z-20">
        
        <div class="bg-white rounded-2xl shadow-lg p-5 mb-6 border border-gray-100">
            <h3 class="font-heading font-800 text-xl italic text-center mb-4 uppercase">Detalhes do Orçamento</h3>
            <div class="bg-brand-dark text-brand-cyan font-bold text-center py-2 rounded-lg mb-6 text-sm uppercase">
                Mudança Residencial
            </div>

            <div class="mb-6">
                <h4 class="font-bold text-brand-cyan border-l-4 border-brand-cyan pl-2 mb-3">1. LOGÍSTICA E TRAJETO</h4>
                <div class="space-y-3">
                    <div class="relative">
                        <i class="fa-solid fa-location-dot absolute left-3 top-3.5 text-brand-red"></i>
                        <input type="text" placeholder="Retirada (Bairro/Cidade)" class="w-full bg-gray-100 rounded-lg py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand-cyan">
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-flag-checkered absolute left-3 top-3.5 text-gray-500"></i>
                        <input type="text" placeholder="Entrega (Bairro/Cidade)" class="w-full bg-gray-100 rounded-lg py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand-cyan">
                    </div>
                    <select class="w-full bg-gray-100 rounded-lg py-3 px-4 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-brand-cyan appearance-none">
                        <option value="">O local possui escadas?</option>
                        <option value="none">Não, térreo ou elevador</option>
                        <option value="1-2">Sim, 1 a 2 lances</option>
                        <option value="3+">Sim, 3 ou mais lances</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <h4 class="font-bold text-brand-cyan border-l-4 border-brand-cyan pl-2 mb-3">2. SERVIÇOS EXTRAS</h4>
                <div class="flex gap-3">
                    <select class="flex-1 bg-gray-100 rounded-lg py-3 px-3 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-brand-cyan">
                        <option>Sem Ajudante</option>
                        <option>1 Ajudante</option>
                        <option>2 Ajudantes</option>
                        <option>3+ Ajudantes</option>
                    </select>
                    <select class="flex-1 bg-white border-2 border-brand-cyan rounded-lg py-3 px-3 text-sm text-gray-600 focus:outline-none">
                        <option>Sem Montador</option>
                        <option>Com Montador</option>
                    </select>
                </div>
            </div>

            <div>
                <h4 class="font-bold text-brand-cyan border-l-4 border-brand-cyan pl-2 mb-3">3. INVENTÁRIO (VOLUME)</h4>
                
                <div class="mb-2 border border-gray-200 rounded-lg overflow-hidden">
                    <button class="w-full bg-gray-50 px-4 py-3 flex justify-between items-center font-bold text-gray-700" onclick="toggleAccordion('acc-cozinha', this)">
                        <span><i class="fa-solid fa-kitchen-set mr-2 text-brand-cyan"></i> Cozinha / Lavanderia</span>
                        <i class="fa-solid fa-chevron-down transition-transform"></i>
                    </button>
                    <div id="acc-cozinha" class="accordion-content bg-white px-4">
                        <div class="space-y-4" id="list-cozinha">
                            </div>
                    </div>
                </div>

                <div class="mb-2 border border-gray-200 rounded-lg overflow-hidden">
                    <button class="w-full bg-gray-50 px-4 py-3 flex justify-between items-center font-bold text-gray-700" onclick="toggleAccordion('acc-sala', this)">
                        <span><i class="fa-solid fa-couch mr-2 text-brand-cyan"></i> Sala de Estar / Jantar</span>
                        <i class="fa-solid fa-chevron-down transition-transform"></i>
                    </button>
                    <div id="acc-sala" class="accordion-content bg-white px-4">
                        <div class="space-y-4" id="list-sala">
                            </div>
                    </div>
                </div>

                <div class="mb-2 border border-gray-200 rounded-lg overflow-hidden">
                    <button class="w-full bg-gray-50 px-4 py-3 flex justify-between items-center font-bold text-gray-700" onclick="toggleAccordion('acc-quarto', this)">
                        <span><i class="fa-solid fa-bed mr-2 text-brand-cyan"></i> Quartos</span>
                        <i class="fa-solid fa-chevron-down transition-transform"></i>
                    </button>
                    <div id="acc-quarto" class="accordion-content bg-white px-4">
                        <div class="space-y-4" id="list-quarto">
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-brand-dark text-white p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.2)] z-50 flex justify-center items-center cursor-pointer hover:bg-brand-light transition" onclick="submitForm()">
        <div class="font-heading font-800 text-lg flex items-center gap-3">
            <span>( <span id="total-items" class="text-brand-cyan">0</span> ) VER MINHA LISTA</span>
            <i class="fa-solid fa-truck-fast text-2xl"></i>
        </div>
    </div>

    <script>
        // Data Structure for Inventory
        const inventoryData = {
            cozinha: [
                { id: 'geladeira', name: 'Geladeira', icon: 'fa-box' },
                { id: 'fogao', name: 'Fogão / Máq. Lavar', icon: 'fa-box' },
                { id: 'armario_coz', name: 'Armário (Módulos)', icon: 'fa-box' },
                { id: 'mesa_peq', name: 'Mesa Pequena', icon: 'fa-box' }
            ],
            sala: [
                { id: 'sofa', name: 'Sofá', icon: 'fa-couch' },
                { id: 'rack', name: 'Rack / Painel', icon: 'fa-tv' },
                { id: 'mesa_jantar', name: 'Mesa de Jantar', icon: 'fa-utensils' },
                { id: 'cadeiras', name: 'Cadeiras (Unidade)', icon: 'fa-chair' }
            ],
            quarto: [
                { id: 'cama_solt', name: 'Cama Solteiro', icon: 'fa-bed' },
                { id: 'cama_casal', name: 'Cama Casal/Queen', icon: 'fa-bed' },
                { id: 'guarda_roupa', name: 'Guarda-Roupa', icon: 'fa-door-closed' },
                { id: 'comoda', name: 'Cômoda / Mesa Cab.', icon: 'fa-box' }
            ]
        };

        let totalItemsCount = 0;

        // Render Inventory Items
        function renderItems(category, containerId) {
            const container = document.getElementById(containerId);
            let html = '';
            
            inventoryData[category].forEach(item => {
                html += `
                <div class="flex justify-between items-center border-b border-gray-100 pb-2 last:border-0 last:pb-0">
                    <div class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <i class="fa-solid ${item.icon} text-gray-400 w-5"></i>
                        ${item.name}
                    </div>
                    <div class="flex items-center gap-3 bg-gray-50 rounded-full px-2 py-1 border border-gray-200">
                        <button class="w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center font-bold hover:bg-brand-cyan hover:text-white transition" onclick="updateCount('${item.id}', -1)">-</button>
                        <span id="count-${item.id}" class="w-4 text-center font-bold text-gray-800 text-sm">0</span>
                        <button class="w-6 h-6 rounded-full bg-brand-dark text-white flex items-center justify-center font-bold hover:bg-brand-cyan transition" onclick="updateCount('${item.id}', 1)">+</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // Initialize Render
        renderItems('cozinha', 'list-cozinha');
        renderItems('sala', 'list-sala');
        renderItems('quarto', 'list-quarto');

        // Logic for Item Counters
        function updateCount(itemId, change) {
            const countElement = document.getElementById(`count-${itemId}`);
            let currentCount = parseInt(countElement.innerText);
            let newCount = currentCount + change;

            if (newCount >= 0) {
                countElement.innerText = newCount;
                totalItemsCount += change;
                
                // Animate total counter
                const totalEl = document.getElementById('total-items');
                totalEl.innerText = totalItemsCount;
                totalEl.classList.add('scale-150', 'text-white');
                setTimeout(() => {
                    totalEl.classList.remove('scale-150', 'text-white');
                }, 200);
            }
        }

        // Accordion Logic
        function toggleAccordion(id, btnElement) {
            const content = document.getElementById(id);
            const icon = btnElement.querySelector('.fa-chevron-down');
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                // Optional: Close others
                document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('open'));
                document.querySelectorAll('.fa-chevron-down').forEach(el => el.style.transform = 'rotate(0deg)');
                
                content.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // Status Toggle Logic (For Demonstration)
        let isAvailable = true;
        function toggleStatus() {
            isAvailable = !isAvailable;
            const badge = document.getElementById('status-badge');
            const indicator = badge.querySelector('.status-indicator');
            const text = badge.querySelector('.status-text');

            if (isAvailable) {
                badge.className = "bg-brand-green/20 border border-brand-green text-brand-green px-4 py-2 rounded-full flex items-center gap-2 text-sm font-bold tracking-wide shadow-lg cursor-pointer transition-colors";
                indicator.className = "w-3 h-3 bg-brand-green rounded-full animate-pulse status-indicator";
                text.innerText = "DISPONÍVEL AGORA";
            } else {
                badge.className = "bg-brand-red/20 border border-brand-red text-brand-red px-4 py-2 rounded-full flex items-center gap-2 text-sm font-bold tracking-wide shadow-lg cursor-pointer transition-colors";
                indicator.className = "w-3 h-3 bg-brand-red rounded-full status-indicator";
                text.innerText = "FORA DO HORÁRIO";
            }
        }

        // Form Submit Simulation
        function submitForm() {
            if (totalItemsCount === 0) {
                alert('Adicione pelo menos um item à sua lista para continuar o orçamento.');
                return;
            }
            alert(`Iniciando cotação para ${totalItemsCount} itens...\n(Aqui entraria o redirecionamento para o WhatsApp ou Checkout)`);
        }
    </script>
</body>
</html>
